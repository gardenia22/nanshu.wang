name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo

      - name: Deploy to gardenia22.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: gardenia22/gardenia22.github.io
          publish_branch: master
          publish_dir: ./public
          user_name: gardenia22
          user_email: nanshu.wang@gmail.com
