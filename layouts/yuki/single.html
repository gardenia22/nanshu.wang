<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yuki，小小探险家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f0eb;
      font-family: Georgia, serif;
    }

    .back {
      display: inline-block;
      padding: 1.5rem 2rem;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a7f78;
      text-decoration: none;
    }
    .back:hover { color: #4a90d9; }

    .book-title {
      text-align: center;
      padding: 1rem 0 2.5rem;
      color: #5a4f47;
    }
    .book-title h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 0.3em;
    }
    .book-title p {
      font-size: 0.85rem;
      color: #9a8f87;
      letter-spacing: 0.1em;
    }

    .pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      padding: 0 1rem 5rem;
    }

    .page {
      width: 100%;
      max-width: 600px;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .page:hover {
      box-shadow: 0 8px 36px rgba(0,0,0,0.15);
    }
    .page img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← Nanshu Wang</a>

  <div class="book-title">
    <h1>Yuki，小小探险家</h1>
    <p>我们的家庭纪念绘本</p>
  </div>

  <div class="pages">
    <div class="page"><img src="/yuki/page01.jpg" alt="Page 01 — Yuki 小小探险家"></div>
    <div class="page"><img src="/yuki/page02.jpg" alt="Page 02 — 早安，Yuki"></div>
    <div class="page"><img src="/yuki/page03.jpg" alt="Page 03 — 在家陪着你"></div>
    <div class="page"><img src="/yuki/page04.jpg" alt="Page 04 — 船长 Yuki"></div>
    <div class="page"><img src="/yuki/page05.jpg" alt="Page 05 — 扑通！"></div>
  </div>
</body>
</html>
